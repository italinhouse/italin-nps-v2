<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Painel NPS — Ital'in House</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--red:#C0392B;--red2:#922B21;--dark:#1A0A05;--bg:#F5EDE3;--card:#FFFFFF;--text:#3D1F15;--muted:#7A5A50;--border:#E8D5C4;--green:#27AE60;--yellow:#F39C12;--r:12px}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

    /* LOGIN */
    #loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--dark);background-image:radial-gradient(ellipse at 20% 30%,rgba(192,57,43,.25),transparent 55%)}
    .lc{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.13);border-radius:20px;padding:44px 38px;width:100%;max-width:390px;text-align:center}
    .lc img{height:42px;margin-bottom:22px;filter:brightness(0) invert(1)}
    .lc h2{color:#fff;font-family:'Playfair Display',serif;font-size:21px;margin-bottom:4px}
    .lc p{color:rgba(255,255,255,.4);font-size:13px;margin-bottom:26px}
    .lf{position:relative;margin-bottom:10px}
    .li{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:12px 44px 12px 14px;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
    .li:focus{border-color:var(--red)}
    .li::placeholder{color:rgba(255,255,255,.28)}
    .lbtn{width:100%;padding:13px;background:var(--red);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .2s;margin-top:2px}
    .lbtn:hover{opacity:.87}
    .lerr{color:#F1948A;font-size:13px;margin-top:10px;display:none}

    /* DASHBOARD */
    #dashboard{display:none;min-height:100vh}
    .topbar{background:var(--dark);display:flex;align-items:center;justify-content:space-between;padding:0 22px;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25)}
    .tl{display:flex;align-items:center;gap:12px}
    .tl img{height:28px;filter:brightness(0) invert(1)}
    .tl span{color:rgba(255,255,255,.55);font-size:13px}
    .badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
    .outbtn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.6);padding:5px 13px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
    .content{padding:22px}

    /* TABS */
    .tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
    .tab{padding:8px 17px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--muted);transition:all .2s;user-select:none}
    .tab.active{background:var(--red);color:#fff;border-color:var(--red)}

    /* KPIs */
    .kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px}
    .kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
    .kpi-lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
    .kpi-val{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--dark)}
    
    /* TABLE */
    .twrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{padding:10px 13px;text-align:left;background:#FAF2EA;font-size:11px;color:var(--muted);text-transform:uppercase}
    td{padding:10px 13px;border-bottom:1px solid #F2E8DF}
    .pill{display:inline-block;width:30px;height:30px;line-height:30px;text-align:center;border-radius:50%;color:#fff;font-weight:bold}
    .pill.p{background:var(--green)}.pill.n{background:var(--yellow)}.pill.d{background:var(--red)}

    @media(max-width:900px){.kpis{grid-template-columns:repeat(3,1fr)}}
  </style>
</head>
<body>

<div id="loginScreen">
  <div class="lc">
    <img src="https://d7jztl9hjt0p1.cloudfront.net/1.0.0.119/assets/images/home/logo@3x.png" alt="Ital'in House"/>
    <h2>Painel Administrativo</h2>
    <p>Sistema de avaliações NPS</p>
    <div class="lf"><input class="li" type="email" id="lEmail" placeholder="E-mail"/></div>
    <div class="lf"><input class="li" type="password" id="lPass" placeholder="Senha"/></div>
    <button class="lbtn" id="loginBtn">Entrar</button>
    <div class="lerr" id="lErr">E-mail ou senha incorretos.</div>
  </div>
</div>

<div id="dashboard">
  <nav class="topbar">
    <div class="tl">
      <img src="https://d7jztl9hjt0p1.cloudfront.net/1.0.0.119/assets/images/home/logo@3x.png" alt=""/>
      <span>Painel NPS</span> <span class="badge">ADMIN</span>
    </div>
    <button class="outbtn" id="outBtn">Sair</button>
  </nav>

  <div class="content">
    <div class="kpis">
      <div class="kpi"><div class="kpi-lbl">Total</div><div class="kpi-val" id="kTotal">0</div></div>
      <div class="kpi"><div class="kpi-lbl">NPS Geral</div><div class="kpi-val" id="kNPS">0</div></div>
      <div class="kpi"><div class="kpi-lbl">Média</div><div class="kpi-val" id="kMedia">0</div></div>
    </div>

    <div class="twrap">
      <table>
        <thead>
          <tr>
            <th>Data</th>
            <th>Loja</th>
            <th>Nota</th>
            <th>Comentário</th>
          </tr>
        </thead>
        <tbody id="tBody">
          <tr><td colspan="4" style="text-align:center;padding:20px">Carregando dados em tempo real...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyCInytAdn5ly8DvqwLUvEFXsfQcP0YXyd4",
    authDomain: "italinhouse-nps.firebaseapp.com",
    projectId: "italinhouse-nps",
    storageBucket: "italinhouse-nps.firebasestorage.app",
    messagingSenderId: "968639332938",
    appId: "1:968639332938:web:d47cda07386bbb645d9cb3"
  };

  const app = initializeApp(FIREBASE_CONFIG);
  const db = getFirestore(app);

  const ADMIN_USERS = {
    "dante@italinhouse.com": "Italinhouse@2026",
    "lucasprimo@italinhouse.com": "Italinhouse@2026",
    "wesleymonteiro@italinhouse.com": "Italinhouse@2026"
  };

  // --- LOGIN LOGIC ---
  const loginBtn = document.getElementById("loginBtn");
  loginBtn.addEventListener("click", () => {
    const email = document.getElementById("lEmail").value;
    const pass = document.getElementById("lPass").value;
    if (ADMIN_USERS[email] === pass) {
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
      startRealtime();
    } else {
      document.getElementById("lErr").style.display = "block";
    }
  });

  document.getElementById("outBtn").addEventListener("click", () => location.reload());

  // --- REALTIME DATA ---
  function startRealtime() {
    const q = query(collection(db, "avaliacoes"), orderBy("criadoEm", "desc"));
    
    onSnapshot(q, (snapshot) => {
      const tBody = document.getElementById("tBody");
      tBody.innerHTML = "";
      
      let total = 0;
      let sum = 0;
      let prom = 0;
      let detr = 0;

      snapshot.forEach((doc) => {
        const d = doc.data();
        total++;
        sum += d.score;
        if (d.score >= 9) prom++;
        if (d.score <= 6) detr++;

        const date = d.criadoEm ? new Date(d.criadoEm.seconds * 1000).toLocaleString('pt-BR') : "Agora";
        const typeClass = d.score >= 9 ? "p" : d.score >= 7 ? "n" : "d";

        tBody.innerHTML += `
          <tr>
            <td style="color:var(--muted)">${date}</td>
            <td><strong>${d.lojaNome || 'Loja'}</strong></td>
            <td><span class="pill ${typeClass}">${d.score}</span></td>
            <td style="font-style:italic; font-size:12px">"${d.comment || '-'}"</td>
          </tr>
        `;
      });

      // Update KPIs
      document.getElementById("kTotal").textContent = total;
      document.getElementById("kMedia").textContent = total ? (sum / total).toFixed(1) : "0";
      const nps = total ? Math.round(((prom - detr) / total) * 100) : 0;
      document.getElementById("kNPS").textContent = (nps > 0 ? "+" : "") + nps;
    });
  }
</script>
</body>
</html>
