<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Painel NPS — Ital'in House</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--red:#C0392B;--red2:#922B21;--dark:#1A0A05;--bg:#F5EDE3;--card:#FFFFFF;--text:#3D1F15;--muted:#7A5A50;--border:#E8D5C4;--green:#27AE60;--yellow:#F39C12;--r:12px}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

    /* LOGIN */
    #loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--dark);background-image:radial-gradient(ellipse at 20% 30%,rgba(192,57,43,.25),transparent 55%)}
    .lc{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.13);border-radius:20px;padding:44px 38px;width:100%;max-width:390px;text-align:center}
    .lc img{height:42px;margin-bottom:22px;filter:brightness(0) invert(1)}
    .lc h2{color:#fff;font-family:'Playfair Display',serif;font-size:21px;margin-bottom:4px}
    .lc p{color:rgba(255,255,255,.4);font-size:13px;margin-bottom:26px}
    .lf{position:relative;margin-bottom:10px}
    .li{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:12px 44px 12px 14px;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
    .li:focus{border-color:var(--red)}
    .li::placeholder{color:rgba(255,255,255,.28)}
    .eye{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(255,255,255,.38);font-size:17px;padding:4px;line-height:1;transition:color .2s}
    .eye:hover{color:rgba(255,255,255,.78)}
    .lbtn{width:100%;padding:13px;background:var(--red);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .2s;margin-top:2px}
    .lbtn:hover{opacity:.87}
    .lerr{color:#F1948A;font-size:13px;margin-top:10px;display:none}

    /* DASHBOARD */
    #dashboard{display:none;min-height:100vh}
    .topbar{background:var(--dark);display:flex;align-items:center;justify-content:space-between;padding:0 22px;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25)}
    .tl{display:flex;align-items:center;gap:12px}
    .tl img{height:28px;filter:brightness(0) invert(1)}
    .tl span{color:rgba(255,255,255,.55);font-size:13px}
    .badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
    .outbtn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.6);padding:5px 13px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
    .outbtn:hover{background:rgba(255,255,255,.14)}
    .content{padding:22px}

    /* TABS */
    .tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
    .tab{padding:8px 17px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--muted);transition:all .2s;user-select:none}
    .tab.active{background:var(--red);color:#fff;border-color:var(--red)}
    .tab:hover:not(.active){border-color:var(--red);color:var(--red)}

    /* KPIs */
    .kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px}
    .kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
    .kpi-lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
    .kpi-val{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--dark)}
    .kpi-val.r{color:var(--red)}.kpi-val.g{color:var(--green)}
    .kpi-sub{font-size:11px;color:var(--muted);margin-top:3px}
    .nps-bar-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:16px}
    .nps-bar-wrap h3{font-size:13px;font-weight:600;margin-bottom:10px}
    .nps-bar{display:flex;height:30px;border-radius:8px;overflow:hidden;gap:2px}
    .ns{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;border-radius:6px;transition:flex .5s}
    .ns.d{background:var(--red)}.ns.p{background:var(--yellow)}.ns.pr{background:var(--green)}
    .nps-lgd{display:flex;gap:14px;margin-top:8px}
    .nps-lgd span{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}
    .dot{width:7px;height:7px;border-radius:50%;display:inline-block}

    /* FILTERS */
    .filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
    .fi{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--card);outline:none;transition:border-color .2s}
    .fi:focus{border-color:var(--red)}
    .acwrap{position:relative;flex:1;min-width:190px}
    .acwrap .fi{width:100%}
    .acdrop{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 18px rgba(0,0,0,.11);z-index:200;max-height:210px;overflow-y:auto}
    .acitem{padding:9px 13px;font-size:13px;cursor:pointer;border-bottom:1px solid #F2E8DF;transition:background .1s}
    .acitem:last-child{border-bottom:none}
    .acitem:hover{background:#FDF8F3}
    .act-btn{padding:8px 15px;background:var(--dark);color:#fff;border:none;border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .2s;white-space:nowrap}
    .act-btn:hover{opacity:.82}
    .act-btn.r{background:var(--red2)}
    
    /* NOVO: Botão de exclusão em massa */
    .btn-delete-bulk { background: #e74c3c !important; display: none; }

    /* TABLE */
    .twrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
    table{width:100%;border-collapse:collapse;font-size:13px}
    thead{background:#FAF2EA}
    th{padding:10px 13px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap}
    th:hover{color:var(--red)}
    td{padding:10px 13px;border-bottom:1px solid #F2E8DF;vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#FDF8F3}
    .pill{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;font-weight:600;font-size:13px;color:#fff}
    .pill.promoter{background:var(--green)}.pill.passive{background:var(--yellow)}.pill.detractor{background:var(--red)}
    .ntag{font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px}
    .ntag.promoter{background:#EAFAF1;color:#1E7A40}.ntag.passive{background:#FEF9E7;color:#7D6608}.ntag.detractor{background:#FDEDEC;color:#922B21}
    .ctag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap}
    .comment-c{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);font-size:12px}
    .empty{text-align:center;padding:44px 20px;color:var(--muted)}
    .loading{text-align:center;padding:44px 20px;color:var(--muted);font-size:14px}
    .sb{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;background:#F5EDE3;color:var(--muted)}

    /* Checkbox Style */
    .chk-col { width: 40px; text-align: center; }
    input[type="checkbox"] { cursor: pointer; transform: scale(1.1); }

    /* LINKS */
    .cpbtn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:#FDF6EE;border:1px solid var(--border);border-radius:6px;font-size:11px;font-weight:500;color:var(--text);cursor:pointer;transition:all .15s;white-space:nowrap}
    .cpbtn:hover,.cpbtn.ok{background:var(--green);color:#fff;border-color:var(--green)}
    .wabtn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:#25D366;border:1px solid #25D366;border-radius:6px;font-size:11px;font-weight:500;color:#fff;cursor:pointer;text-decoration:none;transition:opacity .15s;white-space:nowrap}
    .wabtn:hover{opacity:.84}
    .lnk{font-size:11px;color:#1155CC;font-family:monospace;max-width:270px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}
    
    @media(max-width:900px){.kpis{grid-template-columns:repeat(3,1fr)}.rgrid{grid-template-columns:1fr}}
    @media(max-width:600px){.kpis{grid-template-columns:1fr 1fr}.content{padding:12px}}
  </style>
</head>
<body>

<div id="loginScreen">
  <div class="lc">
    <img src="https://d7jztl9hjt0p1.cloudfront.net/1.0.0.119/assets/images/home/logo@3x.png" alt="Ital'in House"/>
    <h2>Painel Administrativo</h2>
    <p>Sistema de avaliações NPS</p>
    <div class="lf">
      <input class="li" type="email" id="lEmail" placeholder="E-mail" autocomplete="email"/>
    </div>
    <div class="lf">
      <input class="li" type="password" id="lPass" placeholder="Senha" autocomplete="current-password"/>
      <button type="button" class="eye" id="eyeBtn">👁</button>
    </div>
    <button class="lbtn" id="loginBtn">Entrar</button>
    <div class="lerr" id="lErr">E-mail ou senha incorretos.</div>
  </div>
</div>

<div id="dashboard">
  <nav class="topbar">
    <div class="tl">
      <img src="https://d7jztl9hjt0p1.cloudfront.net/1.0.0.119/assets/images/home/logo@3x.png" alt=""/>
      <span>Painel NPS</span>
      <span class="badge">ADMIN</span>
    </div>
    <button class="outbtn" id="outBtn">Sair
