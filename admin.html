<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Painel NPS — Ital'in House</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--red:#C0392B;--red2:#922B21;--dark:#1A0A05;--bg:#F5EDE3;--card:#FFFFFF;--text:#3D1F15;--muted:#7A5A50;--border:#E8D5C4;--green:#27AE60;--yellow:#F39C12;--r:12px}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

    /* LOGIN */
    #loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--dark);background-image:radial-gradient(ellipse at 20% 30%,rgba(192,57,43,.25),transparent 55%)}
    .lc{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.13);border-radius:20px;padding:44px 38px;width:100%;max-width:390px;text-align:center}
    .lc img{height:42px;margin-bottom:22px;filter:brightness(0) invert(1)}
    .lc h2{color:#fff;font-family:'Playfair Display',serif;font-size:21px;margin-bottom:4px}
    .lc p{color:rgba(255,255,255,.4);font-size:13px;margin-bottom:26px}
    .lf{position:relative;margin-bottom:10px}
    .li{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:12px 44px 12px 14px;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
    .li:focus{border-color:var(--red)}
    .li::placeholder{color:rgba(255,255,255,.28)}
    .eye{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(255,255,255,.38);font-size:17px;padding:4px;line-height:1;transition:color .2s}
    .eye:hover{color:rgba(255,255,255,.78)}
    .lbtn{width:100%;padding:13px;background:var(--red);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .2s;margin-top:2px}
    .lbtn:hover{opacity:.87}
    .lerr{color:#F1948A;font-size:13px;margin-top:10px;display:none}

    /* DASHBOARD */
    #dashboard{display:none;min-height:100vh}
    .topbar{background:var(--dark);display:flex;align-items:center;justify-content:space-between;padding:0 22px;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25)}
    .tl{display:flex;align-items:center;gap:12px}
    .tl img{height:28px;filter:brightness(0) invert(1)}
    .tl span{color:rgba(255,255,255,.55);font-size:13px}
    .badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
    .outbtn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.6);padding:5px 13px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
    .outbtn:hover{background:rgba(255,255,255,.14)}
    .content{padding:22px}

    /* TABS */
    .tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
    .tab{padding:8px 17px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--muted);transition:all .2s;user-select:none}
    .tab.active{background:var(--red);color:#fff;border-color:var(--red)}
    .tab:hover:not(.active){border-color:var(--red);color:var(--red)}

    /* TABLE */
    .twrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
    table{width:100%;border-collapse:collapse;font-size:13px}
    thead{background:#FAF2EA}
    th{padding:10px 13px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap}
    th:hover{color:var(--red)}
    td{padding:10px 13px;border-bottom:1px solid #F2E8DF;vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#FDF8F3}

    .pill{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;font-weight:600;font-size:13px;color:#fff}
    .pill.promoter{background:var(--green)}.pill.passive{background:var(--yellow)}.pill.detractor{background:var(--red)}
    
    .filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
    .fi{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--card);outline:none;transition:border-color .2s}
  </style>
</head>
<body>

<div id="loginScreen">
  </div>

<div id="dashboard" style="display: block;">
  <div class="content">
    <div class="filters">
      <select class="fi" id="filterLoja">
        <option value="">Todas as Lojas</option>
      </select>
    </div>

    <div class="twrap">
      <table>
        <thead>
          <tr>
            <th>Data</th>
            <th>Loja</th> <th>Nota</th>
            <th>Comentário</th>
          </tr>
        </thead>
        <tbody id="tBody">
          </tbody>
      </table>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
  import { getFirestore, collection, query, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "SUA_API_KEY",
    projectId: "italinhouse-nps",
    // ... rest of config
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const filterLoja = document.getElementById("filterLoja");
  const tBody = document.getElementById("tBody");

  // Escutar avaliações
  const q = query(collection(db, "avaliacoes"), orderBy("criadoEm", "desc"));
  
  onSnapshot(q, (snapshot) => {
    const data = [];
    const lojasSet = new Map(); // Para preencher o filtro sem duplicados

    snapshot.forEach((doc) => {
      const item = { id: doc.id, ...doc.data() };
      data.push(item);
      
      // Mapeia ID -> Nome para o select
      if (item.lojaId && item.lojaNome) {
        lojasSet.set(item.lojaId, item.lojaNome);
      }
    });

    // Atualiza o filtro de lojas
    filterLoja.innerHTML = '<option value="">Todas as Lojas</option>';
    lojasSet.forEach((nome, id) => {
      const opt = document.createElement("option");
      opt.value = id;
      opt.textContent = nome; // Correção: Mostra o nome no painel
      filterLoja.appendChild(opt);
    });

    renderTable(data);
  });

  function renderTable(data) {
    const valLoja = filterLoja.value;
    
    tBody.innerHTML = data
      .filter(d => !valLoja || d.lojaId === valLoja)
      .map(d => `
        <tr>
          <td>${d.criadoEm ? d.criadoEm.toDate().toLocaleDateString() : '-'}</td>
          <td>
            <div style="font-weight:600">${d.lojaNome || 'Loja Antiga'}</div>
            <div style="font-size:10px; color:#999">ID: ${d.lojaId}</div>
          </td>
          <td><span class="pill ${getScoreClass(d.score)}">${d.score}</span></td>
          <td>${d.comment || '-'}</td>
        </tr>
      `).join('');
  }

  function getScoreClass(s) {
    if (s >= 9) return 'promoter';
    if (s >= 7) return 'passive';
    return 'detractor';
  }

  filterLoja.addEventListener('change', () => {
    // A tabela re-renderiza automaticamente pelo onSnapshot ou chame renderTable manualmente aqui
  });
</script>
</body>
</html>
