<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Painel NPS — Ital'in House</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--red:#C0392B;--red2:#922B21;--dark:#1A0A05;--bg:#F5EDE3;--card:#FFFFFF;--text:#3D1F15;--muted:#7A5A50;--border:#E8D5C4;--green:#27AE60;--yellow:#F39C12;--r:12px}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

    /* LOGIN */
    #loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--dark);background-image:radial-gradient(ellipse at 20% 30%,rgba(192,57,43,.25),transparent 55%)}
    .lc{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.13);border-radius:20px;padding:44px 38px;width:100%;max-width:390px;text-align:center}
    .lc img{height:42px;margin-bottom:22px;filter:brightness(0) invert(1)}
    .lc h2{color:#fff;font-family:'Playfair Display',serif;font-size:21px;margin-bottom:4px}
    .lc p{color:rgba(255,255,255,.4);font-size:13px;margin-bottom:26px}
    .lf{position:relative;margin-bottom:10px}
    .li{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:12px 44px 12px 14px;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
    .li:focus{border-color:var(--red)}
    .li::placeholder{color:rgba(255,255,255,.28)}
    .eye{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(255,255,255,.38);font-size:17px;padding:4px;line-height:1}
    .lbtn{width:100%;padding:13px;background:var(--red);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .2s;margin-top:2px}
    .lbtn:hover{opacity:.87}
    .lerr{color:#F1948A;font-size:13px;margin-top:10px;display:none}

    /* DASHBOARD */
    #dashboard{display:none;min-height:100vh}
    .topbar{background:var(--dark);display:flex;align-items:center;justify-content:space-between;padding:0 22px;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25)}
    .tl{display:flex;align-items:center;gap:12px}
    .tl img{height:28px;filter:brightness(0) invert(1)}
    .tl span{color:rgba(255,255,255,.55);font-size:13px}
    .badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
    .outbtn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.6);padding:5px 13px;border-radius:8px;font-size:12px;cursor:pointer}
    .content{padding:22px}

    /* TABS */
    .tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
    .tab{padding:8px 17px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--muted);transition:all .2s}
    .tab.active{background:var(--red);color:#fff;border-color:var(--red)}

    /* KPIs */
    .kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px}
    .kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
    .kpi-lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
    .kpi-val{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--dark)}
    
    /* FILTERS & BULK */
    .filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
    .fi{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:var(--card);outline:none}
    .act-btn{padding:8px 15px;background:var(--dark);color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer}
    .btn-delete-bulk { background: #e74c3c !important; display: none; }

    /* TABLE */
    .twrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
    table{width:100%;border-collapse:collapse;font-size:13px}
    thead{background:#FAF2EA}
    th{padding:10px 13px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border)}
    td{padding:10px 13px;border-bottom:1px solid #F2E8DF;vertical-align:middle}
    .chk-col { width: 40px; text-align: center; }
    .cpbtn{padding:4px 8px; background:#f0f0f0; border:1px solid #ccc; cursor:pointer; border-radius:4px; font-size:11px;}
    .cpbtn:hover{background:#e0e0e0}
  </style>
</head>
<body>

<div id="loginScreen">
  <div class="lc">
    <img src="https://d7jztl9hjt0p1.cloudfront.net/1.0.0.119/assets/images/home/logo@3x.png" alt="Ital'in House"/>
    <h2>Painel Administrativo</h2>
    <p>Acesse o gerenciamento NPS</p>
    <div class="lf"><input class="li" type="email" id="lEmail" placeholder="E-mail"/></div>
    <div class="lf"><input class="li" type="password" id="lPass" placeholder="Senha"/><button class="eye" id="eyeBtn">👁</button></div>
    <button class="lbtn" id="loginBtn">Entrar</button>
    <div class="lerr" id="lErr">Credenciais inválidas.</div>
  </div>
</div>

<div id="dashboard">
  <nav class="topbar">
    <div class="tl"><img src="https://d7jztl9hjt0p1.cloudfront.net/1.0.0.119/assets/images/home/logo@3x.png"/><span>Painel NPS</span><span class="badge">ADMIN</span></div>
    <button class="outbtn" onclick="location.reload()">Sair</button>
  </nav>

  <div class="content">
    <div class="tabs">
      <div class="tab active" data-target="tabAval">📋 Avaliações</div>
      <div class="tab" data-target="tabLinks">🔗 Links por Lojas</div>
      <div class="tab" data-target="tabRank">🏆 Ranking</div>
    </div>

    <div id="tabAval" class="tab-content">
      <div class="kpis">
        <div class="kpi"><div class="kpi-lbl">Total</div><div class="kpi-val" id="kTotal">0</div></div>
      </div>
      <div class="filters">
        <button class="act-btn btn-delete-bulk" id="btnDeleteBulk">🗑 Excluir Selecionados (<span id="selCount">0</span>)</button>
      </div>
      <div class="twrap">
        <table>
          <thead>
            <tr>
              <th class="chk-col"><input type="checkbox" id="selectAll"></th>
              <th>Data</th><th>Loja</th><th>Nota</th><th>Perfil</th><th>Comentário</th>
            </tr>
          </thead>
          <tbody id="tBody"></tbody>
        </table>
      </div>
    </div>

    <div id="tabLinks" class="tab-content" style="display:none">
      <div class="filters">
        <input class="fi" type="text" id="filterLinks" placeholder="🔍 Filtrar loja..." onkeyup="filterLinksTable()">
      </div>
      <div class="twrap">
        <table>
          <thead>
            <tr><th>Loja</th><th>UF</th><th>ID</th><th>Link de Avaliação</th><th>Ação</th></tr>
          </thead>
          <tbody id="linksBody"></tbody>
        </table>
      </div>
    </div>

    <div id="tabRank" class="tab-content" style="display:none">
        <div class="twrap"><div style="padding:20px">Área do Ranking em desenvolvimento...</div></div>
    </div>

  </div>
</div>

  ];

  // --- LÓGICA DE LOGIN ---
  document.getElementById('loginBtn').onclick = () => {
    const email = document.getElementById('lEmail').value;
    const pass = document.getElementById('lPass').value;
    if(email.length > 3 && pass.length > 3) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      renderLinks(); // Gera os links assim que entra
    } else {
      document.getElementById('lErr').style.display = 'block';
    }
  };

  // --- LÓGICA DE TROCA DE ABAS (CORRIGIDO) ---
  document.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = function() {
      // Remove active de todos
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
      
      // Adiciona active no clicado
      this.classList.add('active');
      const target = this.getAttribute('data-target');
      document.getElementById(target).style.display = 'block';
    }
  });

  // --- RENDERIZAR TABELA DE LINKS ---
  function renderLinks() {
    const body = document.getElementById('linksBody');
    body.innerHTML = '';
    LOJAS.forEach(loja => {
      const link = `https://italinhouse.github.io/italin-nps-v2/?loja=${loja.id}`;
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${loja.nome}</td>
        <td>${loja.uf}</td>
        <td><code>${loja.id}</code></td>
        <td><a href="${link}" target="_blank" style="color:blue; font-size:11px">${link}</a></td>
        <td><button class="cpbtn" onclick="copyLink('${link}')">Copiar</button></td>
      `;
      body.appendChild(tr);
    });
  }

  function copyLink(text) {
    navigator.clipboard.writeText(text);
    alert('Link copiado!');
  }

  function filterLinksTable() {
    const val = document.getElementById('filterLinks').value.toLowerCase();
    const rows = document.querySelectorAll('#linksBody tr');
    rows.forEach(row => {
      row.style.display = row.innerText.toLowerCase().includes(val) ? '' : 'none';
    });
  }
</script>

</body>
</html>
