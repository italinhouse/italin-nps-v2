<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Painel NPS — Ital'in House</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--red:#C0392B;--red2:#922B21;--dark:#1A0A05;--bg:#F5EDE3;--card:#FFFFFF;--text:#3D1F15;--muted:#7A5A50;--border:#E8D5C4;--green:#27AE60;--yellow:#F39C12;--r:12px}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

    .topbar{background:var(--dark);display:flex;align-items:center;justify-content:space-between;padding:0 22px;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25)}
    .tl{display:flex;align-items:center;gap:12px}
    .tl img{height:28px;filter:brightness(0) invert(1)}
    .tl span{color:rgba(255,255,255,.55);font-size:13px}
    .badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}

    .content{padding:22px}
    .tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
    .tab{padding:8px 17px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--muted);transition:all .2s}
    .tab.active{background:var(--red);color:#fff;border-color:var(--red)}
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .twrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden; margin-top: 10px;}
    table{width:100%;border-collapse:collapse;font-size:13px}
    thead{background:#FAF2EA}
    th{padding:12px 15px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border)}
    td{padding:12px 15px;border-bottom:1px solid #F2E8DF; vertical-align: middle;}
    
    .pill{padding:4px 10px; border-radius:20px; color:#fff; font-weight:bold; font-size: 11px;}
    .promoter{background:var(--green)}.passive{background:var(--yellow)}.detractor{background:var(--red)}
    
    .btn-copy{padding:6.5px 12px; background:var(--dark); color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:11px; font-weight: 500;}
    .btn-copy:hover{opacity: 0.9;}
    .fi { padding: 10px; width: 100%; max-width: 350px; border-radius: 8px; border: 1.5px solid var(--border); margin-bottom: 15px; outline: none;}
    .fi:focus { border-color: var(--red); }
  </style>
</head>
<body>

  <nav class="topbar">
    <div class="tl">
      <img src="https://d7jztl9hjt0p1.cloudfront.net/1.0.0.119/assets/images/home/logo@3x.png"/>
      <span>Painel NPS</span><span class="badge">TEMPO REAL</span>
    </div>
  </nav>

  <div class="content">
    <div class="tabs">
      <div class="tab active" data-target="aba-avaliacoes">📋 Avaliações</div>
      <div class="tab" data-target="aba-links">🔗 Links por Loja</div>
    </div>

    <div id="aba-avaliacoes" class="tab-panel active">
      <div class="twrap">
        <table>
          <thead>
            <tr>
              <th>Data</th>
              <th>Loja</th>
              <th>Nota</th>
              <th>Comentário</th>
            </tr>
          </thead>
          <tbody id="lista-avaliacoes">
            <tr><td colspan="4" style="text-align:center; padding: 30px; color: var(--muted)">Conectando ao banco de dados...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div id="aba-links" class="tab-panel">
      <input type="text" class="fi" id="buscaLoja" placeholder="🔍 Buscar loja por nome ou cidade..." onkeyup="filtrarLojas()">
      <div class="twrap">
        <table>
          <thead>
            <tr>
              <th>Nome da Loja</th>
              <th>ID</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="lista-links"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCInytAdn5ly8DvqwLUvEFXsfQcP0YXyd4",
      authDomain: "italinhouse-nps.firebaseapp.com",
      projectId: "italinhouse-nps",
      storageBucket: "italinhouse-nps.firebasestorage.app",
      messagingSenderId: "968639332938",
      appId: "1:968639332938:web:d47cda07386bbb645d9cb3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // FUNÇÕES GLOBAIS (Expostas para o HTML)
    window.copy = (txt) => {
      navigator.clipboard.writeText(txt).then(() => {
        alert('Link da loja copiado com sucesso!');
      });
    };

    window.filtrarLojas = () => {
      const termo = document.getElementById('buscaLoja').value.toLowerCase();
      const linhas = document.querySelectorAll('#lista-links tr');
      linhas.forEach(ln => {
        ln.style.display = ln.innerText.toLowerCase().includes(termo) ? '' : 'none';
      });
    };

    // LÓGICA DE ABAS
    document.querySelectorAll('.tab').forEach(tab => {
      tab.onclick = () => {
        const target = tab.getAttribute('data-target');
        document.querySelectorAll('.tab, .tab-panel').forEach(el => el.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(target).classList.add('active');
      };
    });

    // ESCUTA EM TEMPO REAL
    const q = query(collection(db, "avaliacoes"), orderBy("criadoEm", "desc"));
    onSnapshot(q, (snapshot) => {
      const container = document.getElementById('lista-avaliacoes');
      if (snapshot.empty) {
        container.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:20px">Nenhuma avaliação encontrada.</td></tr>';
        return;
      }
      
      container.innerHTML = '';
      snapshot.forEach(doc => {
        const data = doc.data();
        const score = data.score || 0;
        const status = score >= 9 ? 'promoter' : (score >= 7 ? 'passive' : 'detractor');
        
        // Correção para o "delay" do timestamp do Firebase
        let dataFmt = "Processando...";
        if (data.criadoEm) {
            dataFmt = data.criadoEm.toDate ? data.criadoEm.toDate().toLocaleDateString('pt-BR') : new Date().toLocaleDateString('pt-BR');
        }

        container.innerHTML += `
          <tr>
            <td>${dataFmt}</td>
            <td><strong>${data.lojaNome || 'Loja Indefinida'}</strong></td>
            <td><span class="pill ${status}">${score}</span></td>
            <td>${data.comentario || data.comment || '<small style="color:#ccc">Sem comentário</small>'}</td>
          </tr>
        `;
      });
    });

    // LISTA DE LOJAS
    const LOJAS = [

      {id:"RJ067",nome:"Ital'in House - Rio de Janeiro - Copacabana"},
      {id:"SP068",nome:"Ital'in House - Leme - Centro"}
    ];

    const listContainer = document.getElementById('lista-links');
    listContainer.innerHTML = LOJAS.map(loja => {
      const link = `https://italinhouse.github.io/italin-nps-v2/?loja=${loja.id}&nome=${encodeURIComponent(loja.nome)}`;
      return `
        <tr>
          <td>${loja.nome}</td>
          <td><code>${loja.id}</code></td>
          <td><button class="btn-copy" onclick="copy('${link}')">Copiar Link</button></td>
        </tr>
      `;
    }).join('');
  </script>
</body>
</html>
